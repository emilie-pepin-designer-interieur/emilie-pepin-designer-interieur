<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Émilie Pépin Designer d'intérieur</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #FDF8FA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(107,45,69,0.15);
    }
    .logo { color: #6B2D45; font-size: 22px; font-weight: bold; margin-bottom: 30px; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #F2D9E0;
      border-top-color: #6B2D45;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { color: #6B2D45; margin: 0 0 10px; }
    p { color: #666; font-size: 14px; margin: 5px 0; }
    .detail {
      background: #FDF8FA; border-radius: 8px;
      padding: 15px; margin: 20px 0; text-align: left;
    }
    .detail p { margin: 6px 0; color: #444; }
    .detail strong { color: #6B2D45; }
    #success { display: none; }
    #loading { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Émilie Pépin Designer d'intérieur</div>
  
  <div id="loading">
    <div class="spinner"></div>
    <h2>Envoi du rappel...</h2>
    <p>Veuillez patienter quelques secondes.</p>
  </div>

  <div id="success">
    <div style="font-size:60px">✅</div>
    <h2>Rappel envoyé !</h2>
    <p>Le rappel de paiement a été envoyé au client avec succès.</p>
    <div class="detail" id="detail"></div>
  </div>

  <!-- Formulaire caché qui soumet en POST -->
  <form id="rappelForm" method="POST" target="hiddenFrame" style="display:none">
    <input type="hidden" name="client" id="f_client">
    <input type="hidden" name="numeroFacture" id="f_numeroFacture">
    <input type="hidden" name="projet" id="f_projet">
    <input type="hidden" name="courriel" id="f_courriel">
    <input type="hidden" name="lienFacture" id="f_lienFacture">
  </form>
  <iframe name="hiddenFrame" style="display:none"></iframe>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const client = params.get('client') || '';
  const numeroFacture = params.get('numeroFacture') || '';
  const projet = params.get('projet') || '';
  const courriel = params.get('courriel') || '';
  const lienFacture = params.get('lienFacture') || '';

  const FLUX_URL = 'https://defaulta8238caff2db4be193a7ce2789e111.07.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/01/workflows/b5b9b89335654441b889135f17de2974/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=W5Krg0ylNO6Ws5zzOwJRhcxd00YNeg5RV4V6mpm_o4Y';

  // Remplir et soumettre le formulaire
  document.getElementById('f_client').value = client;
  document.getElementById('f_numeroFacture').value = numeroFacture;
  document.getElementById('f_projet').value = projet;
  document.getElementById('f_courriel').value = courriel;
  document.getElementById('f_lienFacture').value = lienFacture;
  document.getElementById('rappelForm').action = FLUX_URL;
  document.getElementById('rappelForm').submit();

  // Afficher succès après 3 secondes
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    document.getElementById('detail').innerHTML = `
      <p><strong>Client :</strong> ${client}</p>
      <p><strong># Facture :</strong> ${numeroFacture}</p>
      <p><strong>Projet :</strong> ${projet}</p>
      <p><strong>Courriel :</strong> ${courriel}</p>
    `;
  }, 3000);
</script>
</body>
</html>
