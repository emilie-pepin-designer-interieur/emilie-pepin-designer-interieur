<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Émilie Pépin</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #FDF8FA;
      color: #333;
      padding: 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #6B2D45;
    }
    .logo h1 {
      color: #6B2D45;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .logo p {
      color: #9B6B8A;
      font-size: 11px;
      margin-top: 3px;
    }
    .info-box {
      background: #F2D7E0;
      border-left: 4px solid #6B2D45;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .info-box h2 {
      color: #6B2D45;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .info-label {
      color: #6B2D45;
      font-weight: bold;
      min-width: 70px;
    }
    .info-value {
      color: #333;
      text-align: right;
      flex: 1;
      margin-left: 8px;
      font-style: italic;
    }
    .btn-envoyer {
      width: 100%;
      background: #6B2D45;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s;
    }
    .btn-envoyer:hover { background: #9B6B8A; }
    .btn-envoyer:disabled { background: #ccc; cursor: not-allowed; }
    .btn-refresh {
      width: 100%;
      background: transparent;
      color: #9B6B8A;
      border: 1px solid #9B6B8A;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-refresh:hover { background: #F2D7E0; }
    .btn-diagnostic {
      width: 100%;
      background: transparent;
      color: #6B2D45;
      border: 1px dashed #6B2D45;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .btn-diagnostic:hover { background: #F2D7E0; }
    .status {
      text-align: center;
      font-size: 12px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    .status.loading {
      background: #F2D7E0;
      color: #6B2D45;
      display: block;
    }
    .diagnostic-box {
      background: #fff;
      border: 1px solid #C4859A;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 10px;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 250px;
      overflow-y: auto;
      display: none;
    }
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      color: #C4859A;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>Émilie Pépin</h1>
    <p>Designer d'intérieur</p>
  </div>

  <div class="info-box">
    <h2>Informations détectées</h2>
    <div class="info-row">
      <span class="info-label">Client</span>
      <span class="info-value" id="nomClient">Chargement...</span>
    </div>
    <div class="info-row">
      <span class="info-label">Projet</span>
      <span class="info-value" id="nomProjet">Chargement...</span>
    </div>
    <div class="info-row">
      <span class="info-label">Courriel</span>
      <span class="info-value" id="courrielClient">Chargement...</span>
    </div>
  </div>

  <button class="btn-envoyer" id="btnEnvoyer" onclick="envoyerSoumission()">
    🌸 Envoyer la soumission
  </button>
  <button class="btn-refresh" onclick="lireDocument()">
    ↻ Relire le document
  </button>
  <button class="btn-diagnostic" onclick="toggleDiagnostic()">
    🔍 Voir le diagnostic technique
  </button>

  <div class="diagnostic-box" id="diagnosticBox"></div>

  <div class="status" id="status"></div>

  <div class="footer">Anna — Studio Émilie Pépin</div>

  <script>
    var nomClient = '';
    var nomProjet = '';
    var courrielClient = '';
    var dernierDiagnostic = '';
    var FLOW_URL = 'https://defaulta8238caff2db4be193a7ce2789e111.07.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/13/workflows/58b618de7e634b0689bae66d8a2f7dc6/triggers/manual/paths/invoke?api-version=1';

    var msalConfig = {
      auth: {
        clientId: '0208592e-314f-429d-b825-7b85dc92f223',
        authority: 'https://login.microsoftonline.com/a8238caf-f2db-4be1-93a7-ce2789e11107',
        redirectUri: 'https://emilie-pepin-designer-interieur.github.io/emilie-pepin-designer-interieur/taskpane.html'
      },
      cache: {
        cacheLocation: 'localStorage'
      }
    };
    var msalInstance = new msal.PublicClientApplication(msalConfig);
    var FLOW_SCOPES = ['https://service.flow.microsoft.com/User'];

    function obtenirToken() {
      var comptes = msalInstance.getAllAccounts();
      if (comptes.length > 0) {
        return msalInstance.acquireTokenSilent({ scopes: FLOW_SCOPES, account: comptes[0] })
          .catch(function () {
            return msalInstance.acquireTokenPopup({ scopes: FLOW_SCOPES });
          });
      }
      return msalInstance.loginPopup({ scopes: FLOW_SCOPES }).then(function (loginResponse) {
        return msalInstance.acquireTokenSilent({ scopes: FLOW_SCOPES, account: loginResponse.account })
          .catch(function () {
            return msalInstance.acquireTokenPopup({ scopes: FLOW_SCOPES });
          });
      });
    }

    Office.onReady(function(info) {
      if (info.host === Office.HostType.Word) {
        lireDocument();
      }
    });

    function lireDocument() {
      document.getElementById('nomClient').textContent = 'Lecture...';
      document.getElementById('nomProjet').textContent = 'Lecture...';
      document.getElementById('courrielClient').textContent = 'Lecture...';
      nomClient = '';
      nomProjet = '';
      courrielClient = '';

      Word.run(function (context) {
        var tables = context.document.body.tables;
        tables.load('items');
        return context.sync().then(function () {
          if (tables.items.length === 0) {
            dernierDiagnostic = 'Aucun tableau trouvé dans le document.';
            document.getElementById('diagnosticBox').textContent = dernierDiagnostic;
            document.getElementById('nomClient').textContent = 'Non trouvé';
            document.getElementById('nomProjet').textContent = 'Non trouvé';
            document.getElementById('courrielClient').textContent = 'Non trouvé';
            return;
          }

          var premierTableau = tables.items[0];
          premierTableau.rows.load('items');
          return context.sync().then(function () {
            var rows = premierTableau.rows.items;
            rows.forEach(function (row) {
              row.cells.load('items');
            });
            return context.sync().then(function () {
              rows.forEach(function (row) {
                row.cells.items.forEach(function (cell) {
                  cell.body.load('text');
                });
              });
              return context.sync().then(function () {
                var lignesDiagnostic = [];
                lignesDiagnostic.push(rows.length + ' ligne(s) trouvée(s) dans le premier tableau :');
                lignesDiagnostic.push('');

                rows.forEach(function (row, rIndex) {
                  var texteCellules = row.cells.items.map(function (cell) {
                    return '[' + cell.body.text.trim() + ']';
                  });
                  lignesDiagnostic.push('Ligne ' + rIndex + ': ' + texteCellules.join('  '));

                  if (row.cells.items.length >= 2) {
                    var label = row.cells.items[0].body.text.trim().toUpperCase();
                    var valeur = row.cells.items[1].body.text.trim();

                    if (label.indexOf('CLIENT') !== -1) { nomClient = valeur; }
                    else if (label.indexOf('PROJET') !== -1) { nomProjet = valeur; }
                    else if (label.indexOf('COURRIEL') !== -1) { courrielClient = valeur; }
                  }
                });

                dernierDiagnostic = lignesDiagnostic.join('\n');
                document.getElementById('diagnosticBox').textContent = dernierDiagnostic;

                document.getElementById('nomClient').textContent = nomClient || 'Non trouvé';
                document.getElementById('nomProjet').textContent = nomProjet || 'Non trouvé';
                document.getElementById('courrielClient').textContent = courrielClient || 'Non trouvé';
              });
            });
          });
        });
      }).catch(function (err) {
        afficherStatut('Erreur de lecture : ' + err.message, 'error');
      });
    }

    function toggleDiagnostic() {
      var box = document.getElementById('diagnosticBox');
      box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    function envoyerSoumission() {
      if (!nomClient || !nomProjet) {
        afficherStatut('❌ Client ou projet non détecté. Cliquez sur "Relire le document".', 'error');
        return;
      }

      var btn = document.getElementById('btnEnvoyer');
      btn.disabled = true;
      afficherStatut('🔐 Connexion à Microsoft en cours...', 'loading');

      obtenirToken().then(function (tokenResponse) {
        try {
          var partiesJeton = tokenResponse.accessToken.split('.');
          var chargeUtile = JSON.parse(atob(partiesJeton[1].replace(/-/g, '+').replace(/_/g, '/')));
          var infosJeton = 'Audience (aud): ' + chargeUtile.aud + '\nScopes (scp): ' + chargeUtile.scp + '\nApp ID (appid): ' + (chargeUtile.appid || chargeUtile.azp || '(absent)');
          document.getElementById('diagnosticBox').textContent = infosJeton;
          document.getElementById('diagnosticBox').style.display = 'block';
        } catch (e) {
          document.getElementById('diagnosticBox').textContent = 'Impossible de décoder le jeton : ' + e.message;
          document.getElementById('diagnosticBox').style.display = 'block';
        }

        afficherStatut('⏳ Envoi en cours... Veuillez patienter.', 'loading');
        return fetch(FLOW_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + tokenResponse.accessToken
          },
          body: JSON.stringify({
            nomClient: nomClient,
            nomProjet: nomProjet,
            courrielClient: courrielClient
          })
        });
      })
      .then(function(response) {
        if (response.ok || response.status === 202) {
          afficherStatut('✅ Soumission envoyée avec succès à ' + courrielClient + ' !', 'success');
        } else {
          throw new Error('Erreur ' + response.status);
        }
      })
      .catch(function(err) {
        afficherStatut('❌ Erreur : ' + err.message, 'error');
      })
      .finally(function() {
        btn.disabled = false;
      });
    }

    function afficherStatut(message, type) {
      var el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status ' + type;
    }
  </script>
</body>
</html>
